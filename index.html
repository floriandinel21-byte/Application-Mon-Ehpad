<!doctype html>
<html lang="fr">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no" />
  <title>EHPAD Staff – Démo Web (locale)</title>
  <style>

/* ── Thème sombre (défaut) ───────────────────────────────────────────────────*/
:root{
  --bg: #0b1220;
  --panel: #0f1a30;
  --card: #101d35;
  --card2: #0f1a30;
  --text: #eef3ff;
  --muted: #a9b6d3;
  --line: rgba(255,255,255,.08);
  --primary: #4f8cff;
  --primary2: #2f6df0;
  --danger: #ff4f6d;
  --success: #32d583;
  --shadow: 0 12px 40px rgba(0,0,0,.35);
  --radius: 18px;
  --grad1: rgba(79,140,255,.35);
  --grad2: rgba(50,213,131,.25);
}

/* ── Thème clair ─────────────────────────────────────────────────────────────*/
[data-theme="light"]{
  --bg: #f0f4ff;
  --panel: #e4eaf8;
  --card: #ffffff;
  --card2: #eef2fc;
  --text: #0f1a30;
  --muted: #6b7a9e;
  --line: rgba(0,0,0,.09);
  --primary: #2f6df0;
  --primary2: #1a55d6;
  --danger: #e0284a;
  --success: #17a05a;
  --shadow: 0 12px 40px rgba(0,0,0,.10);
  --grad1: rgba(79,140,255,.18);
  --grad2: rgba(50,213,131,.12);
}

*{box-sizing:border-box}
html,body{height:100%}
body{
  margin:0;
  font-family: ui-sans-serif, system-ui, -apple-system, Segoe UI, Roboto, Arial, "Apple Color Emoji","Segoe UI Emoji";
  background: radial-gradient(1200px 800px at 20% -10%, var(--grad1), transparent 60%),
              radial-gradient(1200px 800px at 110% 20%, var(--grad2), transparent 55%),
              var(--bg);
  color: var(--text);
  transition: background .3s ease, color .2s ease;
}
a{color:inherit}
.hidden{display:none !important}
.row{display:flex}
.col{display:flex;flex-direction:column}
.gap{gap:12px}
.center{align-items:center;justify-content:center}

.screen{ min-height:100vh; display:flex; flex-direction:column; }
.topbar{ padding:20px 18px 8px; display:flex; justify-content:center; }
.brand{display:flex;gap:12px;align-items:center}
.logo{ width:42px;height:42px;border-radius:14px; background: linear-gradient(135deg, rgba(79,140,255,1), rgba(47,109,240,1)); display:grid;place-items:center; font-weight:800; box-shadow: var(--shadow); }
.brand-title{font-weight:800;font-size:18px}
.brand-subtitle{color:var(--muted);font-size:12px;margin-top:2px}
.content{ width:min(980px, 100%); margin:0 auto; padding:12px 18px 28px; display:grid; grid-template-columns: 1fr; gap:14px; }
@media(min-width:860px){ .content{grid-template-columns: 1.1fr .9fr;} }
.card{ background: linear-gradient(180deg, rgba(255,255,255,.04), rgba(255,255,255,.02)); border:1px solid var(--line); border-radius: var(--radius); padding:16px; box-shadow: var(--shadow); }
.hero{padding:18px}
.hero-title{font-size:22px;font-weight:850}
.hero-sub{color:var(--muted);margin-top:6px}
.section-title{font-weight:750;margin-bottom:10px}
.bullets{margin:0;padding-left:18px;color:var(--muted);line-height:1.65}
.field{flex:1;display:flex;flex-direction:column;gap:6px}
label{font-size:12px;color:var(--muted)}
input, select, textarea{
  min-width:0;
  width:100%;
  box-sizing:border-box;
  padding:12px;
  border-radius:14px;
  background: rgba(255,255,255,.04);
  border:1px solid var(--line);
  color:var(--text);
  outline:none;
}
select option{
  background: var(--panel);
  color: var(--text);
}
[data-theme="light"] select option{
  background: #ffffff;
  color: #0f1a30;
}
textarea{min-height:92px;resize:vertical}
.btn{ width:100%; margin-top:12px; padding:12px 14px; border-radius:14px; border:1px solid var(--line); background: rgba(255,255,255,.04); color:var(--text); font-weight:700; cursor:pointer; }
.btn.primary{ background: linear-gradient(135deg, var(--primary), var(--primary2)); border: none; }
.btn.danger{ background: linear-gradient(135deg, rgba(255,79,109,1), rgba(255,42,86,1)); border:none; }
.btn.ghost{ background: transparent; border:1px solid var(--line); }
.btn.small{width:auto;margin:0;padding:10px 12px;border-radius:12px;font-weight:700}
.hint{display:flex;gap:8px;flex-wrap:wrap;margin-top:12px}
.pill{ font-size:12px; padding:6px 10px; border-radius:999px; border:1px solid var(--line); background: rgba(255,255,255,.03); color:var(--muted); cursor:pointer; }

/* ── App shell ───────────────────────────────────────────────────────────────*/
.app{ height:100vh; width:min(420px, 100%); margin:0 auto; background: rgba(0,0,0,.12); display:flex; flex-direction:column; border-left:1px solid rgba(255,255,255,.06); border-right:1px solid rgba(255,255,255,.06); }
.statusbar{height:12px}
.appbar{ display:flex; align-items:center; justify-content:space-between; padding:14px 12px 10px; border-bottom:1px solid var(--line); background: linear-gradient(180deg, rgba(255,255,255,.04), rgba(255,255,255,.01)); }
.appbar-left{display:flex;gap:8px;align-items:center}
.appbar-title{font-weight:850;font-size:16px}
.appbar-sub{color:var(--muted);font-size:12px;margin-top:2px}
.iconbtn{ width:38px;height:38px;border-radius:12px; border:1px solid var(--line); background: rgba(255,255,255,.04); display:grid;place-items:center; cursor:pointer; color:var(--text); }
.iconbtn svg{width:20px;height:20px}
.iconbtn.primary{ background: rgba(79,140,255,.18); border-color: rgba(79,140,255,.35); }
.main{ flex:1; overflow:auto; padding:12px 12px 148px; display:flex; flex-direction:column; gap:16px; }
.tabbar{ position:sticky; bottom:0; display:grid; grid-template-columns: repeat(5, 1fr); gap:8px; padding:10px 10px 12px; border-top:1px solid var(--line); background: linear-gradient(180deg, rgba(0,0,0,.2), rgba(0,0,0,.38)); backdrop-filter: blur(10px); }
.tab{ display:flex; flex-direction:column; gap:6px; align-items:center; justify-content:center; padding:10px 6px; border-radius:14px; color:var(--muted); cursor:pointer; user-select:none; }
.tab.active{ color:var(--text); background: rgba(79,140,255,.14); border:1px solid rgba(79,140,255,.35); }
.tab svg{width:18px;height:18px}
.tab span{font-size:11px}

/* ── Cards ───────────────────────────────────────────────────────────────────*/
.cardlist{display:flex;flex-direction:column;gap:10px}
.carditem{ background: rgba(255,255,255,.03); border:1px solid var(--line); border-radius: var(--radius); padding:14px; }
.carditem h3{margin:0 0 8px;font-size:14px}
.muted{color:var(--muted);font-size:12px}
.split{ display:grid; grid-template-columns: 1fr; gap:10px; }
@media(min-width:380px){ .split{grid-template-columns: 1fr 1fr;} }
.grid2{ display:grid; grid-template-columns: minmax(0,1fr) minmax(0,1fr); gap:10px; }
.grid2 > *{ min-width:0; }
.badge{ display:inline-flex; align-items:center; gap:6px; padding:6px 10px; border-radius:999px; border:1px solid var(--line); background: rgba(255,255,255,.03); color:var(--muted); font-size:12px; }
.badge.ok{border-color: rgba(50,213,131,.35); background: rgba(50,213,131,.10); color:#bff3db}
.badge.warn{border-color: rgba(255,196,0,.35); background: rgba(255,196,0,.10); color:#ffe7a8}
.badge.no{border-color: rgba(255,79,109,.35); background: rgba(255,79,109,.10); color:#ffd0d9}
.hr{height:1px;background:var(--line);margin:12px 0}

/* ── Messages ────────────────────────────────────────────────────────────────*/
.chat{ display:flex; flex-direction:column; gap:10px; }
.bubble{ max-width:82%; padding:10px 12px; border-radius:16px; border:1px solid var(--line); background: rgba(255,255,255,.04); box-shadow: 0 6px 18px rgba(0,0,0,.20); }
.bubble.me{ margin-left:auto; background: rgba(79,140,255,.18); border-color: rgba(79,140,255,.35); }
.bubble .time{margin-top:6px;font-size:10px;color:var(--muted)}
.chatbar{ position:fixed; bottom:84px; left:50%; transform:translateX(-50%); width:min(420px,100%); display:flex; gap:8px; padding:10px 12px; background: linear-gradient(180deg, rgba(11,18,32,0), rgba(11,18,32,.96)); backdrop-filter: blur(12px); border-top:1px solid var(--line); z-index:50; }
.chatbar input{flex:1}
.chat-empty{ display:flex;flex-direction:column;align-items:center;gap:10px; padding:30px 20px;color:var(--muted);font-size:13px;text-align:center; }
.chat-empty svg{width:32px;height:32px;opacity:.4}

/* ── Modal ───────────────────────────────────────────────────────────────────*/
.modal-backdrop{ position:fixed; inset:0; background: rgba(0,0,0,.82); display:flex; align-items:flex-end; justify-content:center; padding:14px; }
.modal{ width:min(420px, 100%); background: linear-gradient(180deg, #151f38, #101828); border:1px solid rgba(255,255,255,.15); border-radius: 22px; box-shadow: 0 24px 60px rgba(0,0,0,.7); overflow:hidden; }
.modal-head{ display:flex; justify-content:space-between; align-items:center; padding:14px 12px; border-bottom:1px solid var(--line); }
.modal-title{font-weight:850}
.modal-body{padding:12px}
.modal-foot{padding:12px;border-top:1px solid var(--line);display:flex;gap:8px}
.modal-foot .btn{margin:0}
.grid2-modal{display:grid;grid-template-columns:minmax(0,1fr) minmax(0,1fr);gap:10px}
.grid2-modal > *{min-width:0}

/* ── Toast ───────────────────────────────────────────────────────────────────*/
.toast{
  position:fixed; left:50%; transform:translateX(-50%) translateY(0); bottom:92px;
  background:rgba(20,30,52,.92); border:1px solid rgba(255,255,255,.12);
  padding:10px 16px; border-radius:16px; color:var(--text); font-size:13px; font-weight:600;
  box-shadow:0 8px 32px rgba(0,0,0,.45); display:flex; align-items:center; gap:8px;
  white-space:nowrap; z-index:300;
  transition:opacity .25s ease, transform .25s ease;
}
.toast.hidden{ opacity:0; pointer-events:none; transform:translateX(-50%) translateY(10px); }
.toast.success{ background:rgba(18,52,35,.95); border-color:rgba(50,213,131,.4); color:#c8f6df; }
.toast.error{   background:rgba(52,18,26,.95); border-color:rgba(255,79,109,.4);  color:#ffd0d9; }
.toast.info{    background:rgba(18,28,52,.95); border-color:rgba(79,140,255,.4);  color:#cfe0ff; }
.toast-icon{ font-size:16px; line-height:1; flex-shrink:0; }

/* ── iOS Calendar ────────────────────────────────────────────────────────────*/
.ioscal-wrap{ background: rgba(255,255,255,.03); border:1px solid var(--line); border-radius: 22px; overflow:hidden; }
.ioscal-head{ display:flex; align-items:center; justify-content:space-between; padding:14px 12px; background: linear-gradient(180deg, rgba(255,255,255,.05), rgba(255,255,255,.02)); border-bottom:1px solid var(--line); }
.ioscal-title{ font-weight:900; letter-spacing:.2px; }
.ioscal-head .muted{margin:0}
.ioscal-nav{display:flex;gap:8px;}
.ioscal-dow{ display:grid; grid-template-columns: repeat(7, 1fr); gap:0; padding:10px 12px 8px; font-size:11px; color: var(--muted); background: rgba(255,255,255,.02); }
.ioscal-grid{ display:grid; grid-template-columns: repeat(7, 1fr); padding:10px 10px 12px; gap:6px; background: rgba(0,0,0,.12); }
.ioscal-cell{ aspect-ratio: 1 / 1; border-radius: 14px; display:flex; align-items:center; justify-content:center; position:relative; border:1px solid rgba(255,255,255,.06); background: rgba(255,255,255,.02); cursor:pointer; user-select:none; }
.ioscal-cell.off{ opacity:.35; cursor:default; }
.ioscal-cell .num{ font-weight:850; font-size:12px; }
.ioscal-cell.today{ background: rgba(79,140,255,.22); border-color: rgba(79,140,255,.45); }
.ioscal-cell.sel{ outline: 2px solid rgba(50,213,131,.65); outline-offset: 0px; }
.dots{ position:absolute; bottom:8px; display:flex; gap:4px; height:6px; align-items:center; }
.dot{ width:5px;height:5px;border-radius:999px; background: rgba(255,255,255,.45); }
.dot.me{ background: rgba(79,140,255,.95); }
.dot.unit{ background: rgba(50,213,131,.95); }
.dot.night{ background: rgba(168,85,247,.95); }
.dot.journee{ background:rgba(255,159,67,.95); }
.ioscal-detail{ padding:12px; background: rgba(255,255,255,.02); border-top:1px solid var(--line); }
.ioscal-detail h4{ margin:0 0 8px; font-size:13px; font-weight:900; }
.detail-line{ display:flex; justify-content:space-between; align-items:flex-start; gap:10px; padding:10px; border:1px solid rgba(255,255,255,.06); background: rgba(255,255,255,.02); border-radius: 16px; margin-bottom:8px; }
.detail-line .left{ display:flex; flex-direction:column; gap:4px; }
.tag{ display:inline-flex; align-items:center; gap:6px; padding:5px 9px; border-radius:999px; border:1px solid var(--line); font-size:11px; color: var(--muted); background: rgba(255,255,255,.02); width:fit-content; }
.tag.me{ border-color: rgba(79,140,255,.35); color:#cfe0ff; background: rgba(79,140,255,.10);}
.tag.unit{ border-color: rgba(50,213,131,.35); color:#c8f6df; background: rgba(50,213,131,.10);}
.tag.night{ border-color:rgba(168,85,247,.35); color:#e5c8ff; background:rgba(168,85,247,.12); }
.tag.soir{ border-color:rgba(255,159,67,.35); color:#ffe4b8; background:rgba(255,159,67,.12); }
.tag.matin{ border-color:rgba(79,140,255,.35); color:#cfe0ff; background:rgba(79,140,255,.10); }
.tag.journee{ border-color:rgba(255,159,67,.35); color:#ffe4b8; background:rgba(255,159,67,.12); }

/* ── Unit selector ───────────────────────────────────────────────────────────*/
.unit-selector-row{ display:flex; gap:8px; padding:12px 12px 0; flex-wrap:wrap; }
.unit-sel-btn{ padding:7px 14px; border-radius:999px; font-size:12px; font-weight:700; border:1px solid var(--line); background:rgba(255,255,255,.03); color:var(--muted); cursor:pointer; transition:all .15s; }
.unit-sel-btn.active{ background:rgba(79,140,255,.18); border-color:rgba(79,140,255,.5); color:#cfe0ff; }

/* ── KPI Grid ────────────────────────────────────────────────────────────────*/
.kpi-grid{ display:grid; grid-template-columns:repeat(3,1fr); gap:10px; }
.kpi-card{ background:rgba(255,255,255,.03); border:1px solid var(--line); border-radius:var(--radius); padding:14px 10px; display:flex; flex-direction:column; align-items:center; gap:6px; text-align:center; }
.kpi-icon{ width:34px;height:34px;border-radius:11px; display:grid;place-items:center;flex-shrink:0; }
.kpi-icon svg{width:18px;height:18px}
.kpi-val{ font-size:22px;font-weight:900;line-height:1; }
.kpi-label{ font-size:10px;color:var(--muted);line-height:1.3; }

/* ── Avatars ─────────────────────────────────────────────────────────────────*/
.avatar-row{ display:flex;gap:10px;flex-wrap:wrap; justify-content:center; margin:14px 0 4px; }
.avatar-chip{ display:flex;flex-direction:column;align-items:center;gap:6px; cursor:pointer;padding:10px 12px;border-radius:16px; border:1px solid var(--line); background:rgba(255,255,255,.02); transition:all .15s; font-size:12px;color:var(--muted); }
.avatar-chip.active{ background:rgba(79,140,255,.12); border-color:rgba(79,140,255,.45); color:var(--text); }
.avatar-circle{ width:40px;height:40px;border-radius:14px; display:grid;place-items:center; font-weight:900;font-size:14px; color:#fff; }

/* ── Tag Picker ──────────────────────────────────────────────────────────────*/
.tag-picker-wrap{ display:flex; flex-direction:column; gap:8px; margin-top:6px; position:relative; }
.tag-picker-search{ width:100%; padding:11px 14px; border-radius:14px; background:rgba(255,255,255,.05); border:1px solid var(--line); color:var(--text); outline:none; font-size:13px; box-sizing:border-box; }
.tag-picker-search:focus{ border-color:rgba(79,140,255,.55); }
.tag-suggestions{ position:absolute; top:calc(100% + 6px); left:0; right:0; z-index:100; background: linear-gradient(180deg,rgba(15,26,48,1),rgba(11,18,32,1)); border:1px solid rgba(79,140,255,.35); border-radius:14px; overflow:hidden; list-style:none; margin:0; padding:4px 0; box-shadow: 0 12px 32px rgba(0,0,0,.5); }
.tag-suggestions li{ padding:10px 14px; font-size:13px; cursor:pointer; color:var(--text); }
.tag-suggestions li:hover{ background:rgba(79,140,255,.18); }
.tag-suggestions.hidden{ display:none; }
.tag-sel-list{ display:flex; flex-wrap:wrap; gap:6px; }
.tag-sel-chip{ display:inline-flex; align-items:center; gap:6px; padding:7px 11px; border-radius:999px; font-size:12px; font-weight:650; background:rgba(79,140,255,.15); border:1px solid rgba(79,140,255,.45); color:#cfe0ff; }
.tag-sel-chip .rm{ cursor:pointer; opacity:.6; font-size:11px; line-height:1; background:rgba(255,255,255,.12); border-radius:999px; padding:1px 4px; }
.tag-sel-chip .rm:hover{ opacity:1; background:rgba(255,79,109,.35); }

/* ── Hours counter ───────────────────────────────────────────────────────────*/
.hours-counter{ margin-bottom:4px; }
.hours-bar{ height:7px; border-radius:999px; background:rgba(255,255,255,.08); overflow:hidden; }
.hours-bar-fill{ height:100%; border-radius:999px; transition:width .5s ease; }

/* ── Week view ───────────────────────────────────────────────────────────────*/
.week-wrap{ display:flex; flex-direction:column; }
.week-nav-row{ display:flex; align-items:center; justify-content:space-between; padding:10px 12px; border-bottom:1px solid var(--line); background:rgba(255,255,255,.02); }
.week-grid{ display:flex; flex-direction:column; }
.week-row{ display:flex; align-items:flex-start; gap:10px; padding:10px 12px; border-bottom:1px solid var(--line); transition:background .15s; }
.week-day-label{ width:36px; flex-shrink:0; text-align:center; }
.week-day-name{ font-size:11px; color:var(--muted); text-transform:capitalize; }
.week-day-num{ font-size:17px; font-weight:900; line-height:1.1; }
.week-shifts{ display:flex; flex-direction:column; gap:4px; flex:1; }
.week-shift{ font-size:12px; }
.week-shift.me{ font-weight:750; }
.week-shift.off{ color:var(--muted); font-style:italic; font-size:11px; }
.week-shift.team{ opacity:.6; }

/* ── Notifications (profil) ──────────────────────────────────────────────────*/
.notif-item{ padding:10px 12px; border-radius:14px; margin-bottom:6px; border:1px solid var(--line); font-size:13px; display:flex; align-items:flex-start; gap:10px; }
.notif-item.unread{ background:rgba(79,140,255,.08); border-color:rgba(79,140,255,.3); }
.notif-item.read{ opacity:.5; background:rgba(255,255,255,.02); }

/* ── Réactions messages ─────────────────────────────────────────────────────*/
.react-bar{
  display:flex; gap:4px; margin-top:6px; flex-wrap:wrap;
  opacity:0; pointer-events:none;
  transition:opacity .15s;
}
.bubble:hover .react-bar{ opacity:1; pointer-events:all; }
.react-opt{
  width:28px; height:28px; border-radius:8px; font-size:15px;
  border:1px solid var(--line); background:rgba(255,255,255,.05);
  cursor:pointer; display:grid; place-items:center;
  transition:transform .1s, background .1s;
}
.react-opt:hover{ background:rgba(255,255,255,.14); transform:scale(1.2); }
.react-chips{ display:flex; gap:5px; flex-wrap:wrap; margin-top:5px; }
.react-chip{
  display:inline-flex; align-items:center; gap:4px;
  padding:3px 8px; border-radius:999px; font-size:12px; font-weight:700;
  border:1px solid var(--line); background:rgba(255,255,255,.07);
  cursor:pointer; transition:background .1s;
}
.react-chip:hover{ background:rgba(79,140,255,.18); border-color:rgba(79,140,255,.4); }

/* ── Messages épinglés ──────────────────────────────────────────────────────*/
.pinned-banner{
  display:flex; align-items:flex-start; gap:10px;
  padding:12px 14px; border-radius:16px; margin-bottom:10px;
  background:rgba(255,196,0,.10); border:1px solid rgba(255,196,0,.35);
  position:relative;
}
.pinned-banner-icon{ font-size:16px; flex-shrink:0; margin-top:1px; }
.pinned-banner-body{ flex:1; min-width:0; }
.pinned-banner-label{ font-size:10px; font-weight:800; color:#f0c040; text-transform:uppercase; letter-spacing:.6px; margin-bottom:3px; }
.pinned-banner-text{ font-size:13px; line-height:1.45; }
.pinned-banner-meta{ font-size:11px; color:var(--muted); margin-top:4px; }
.pinned-banner-del{ position:absolute; top:8px; right:8px; width:22px; height:22px; border-radius:7px; border:1px solid var(--line); background:rgba(255,255,255,.05); color:var(--muted); cursor:pointer; display:grid; place-items:center; font-size:11px; }
.pinned-banner-del:hover{ background:rgba(255,79,109,.2); color:var(--danger); }
[data-theme="light"] .pinned-banner{ background:rgba(255,196,0,.08); border-color:rgba(200,150,0,.35); }
[data-theme="light"] .pinned-banner-label{ color:#8a6500; }

/* ── Thème clair : corrections des éléments à fond fixe ────────────────────*/
[data-theme="light"] body{
  background: radial-gradient(1200px 800px at 20% -10%, var(--grad1), transparent 60%),
              radial-gradient(1200px 800px at 110% 20%, var(--grad2), transparent 55%),
              var(--bg);
}
[data-theme="light"] .app{ background:rgba(255,255,255,.55); border-color:rgba(0,0,0,.07); }
[data-theme="light"] .appbar{ background:linear-gradient(180deg,rgba(255,255,255,.85),rgba(255,255,255,.6)); backdrop-filter:blur(12px); }
[data-theme="light"] .tabbar{ background:linear-gradient(180deg,rgba(240,244,255,.85),rgba(230,236,255,.95)); }
[data-theme="light"] .tab.active{ background:rgba(47,109,240,.12); border-color:rgba(47,109,240,.35); }

/* ── Notification bell badge ─────────────────────────────────────────────────*/
#btnNotif{ position:relative; }
.notif-bell-badge{
  position:absolute; top:4px; right:4px;
  background:var(--danger); color:#fff;
  font-size:9px; font-weight:900;
  border-radius:999px; padding:1px 4px;
  min-width:15px; text-align:center; line-height:1.5;
  pointer-events:none;
}

/* ── Notification drawer ─────────────────────────────────────────────────────*/
.notif-drawer-backdrop{
  position:fixed; inset:0; background:rgba(0,0,0,.55);
  z-index:200; opacity:0; pointer-events:none;
  transition:opacity .22s ease;
}
.notif-drawer-backdrop.open{ opacity:1; pointer-events:all; }

.notif-drawer{
  position:fixed; top:0; left:50%;
  transform:translateX(-50%) translateY(-110%);
  width:min(420px, 100%);
  max-height:72vh;
  background: linear-gradient(180deg, #151f38 0%, #101828 100%);
  border:1px solid rgba(255,255,255,.12);
  border-top:none;
  border-radius:0 0 24px 24px;
  box-shadow:0 24px 60px rgba(0,0,0,.7);
  z-index:201;
  display:flex; flex-direction:column;
  transition:transform .28s cubic-bezier(.4,0,.2,1);
  overflow:hidden;
}
.notif-drawer.open{ transform:translateX(-50%) translateY(0); }

.notif-drawer-head{
  display:flex; align-items:center; justify-content:space-between;
  padding:14px 14px 10px;
  border-bottom:1px solid var(--line);
  flex-shrink:0;
}
.notif-drawer-head h3{ margin:0; font-size:15px; font-weight:900; }

.notif-drawer-actions{ display:flex; gap:8px; align-items:center; }

.notif-drawer-list{
  overflow-y:auto; padding:10px 12px 16px;
  display:flex; flex-direction:column; gap:8px;
  flex:1;
}
.notif-drawer-empty{
  display:flex; flex-direction:column; align-items:center;
  gap:10px; padding:32px 20px;
  color:var(--muted); font-size:13px; text-align:center;
}
.notif-drawer-empty svg{ width:32px;height:32px;opacity:.35; }

.nditem{
  display:flex; align-items:flex-start; gap:10px;
  padding:10px 12px; border-radius:14px;
  border:1px solid var(--line);
  background:rgba(255,255,255,.02);
  font-size:13px; transition:background .15s;
}
.nditem.unread{
  background:rgba(79,140,255,.09);
  border-color:rgba(79,140,255,.3);
}
.nditem-icon{
  width:32px; height:32px; border-radius:10px;
  display:grid; place-items:center;
  flex-shrink:0; font-size:15px;
}
.nditem-icon.swap{ background:rgba(79,140,255,.18); }
.nditem-icon.leave{ background:rgba(50,213,131,.15); }
.nditem-icon.ot{ background:rgba(255,196,0,.15); }
.nditem-icon.info{ background:rgba(255,255,255,.07); }
.nditem-body{ flex:1; min-width:0; }
.nditem-msg{ line-height:1.4; }
.nditem-time{ color:var(--muted); font-size:11px; margin-top:3px; }
.nditem-del{
  width:26px; height:26px; border-radius:8px; flex-shrink:0;
  border:1px solid var(--line); background:rgba(255,255,255,.04);
  color:var(--muted); cursor:pointer; display:grid; place-items:center;
  transition:background .15s, color .15s;
}
.nditem-del:hover{ background:rgba(255,79,109,.2); color:var(--danger); border-color:rgba(255,79,109,.35); }


/* ═══════════════════════════════════════════════
   RESPONSIVE — Tablette 768px+ & Desktop 1200px+
   Pure CSS, zero JS changes
   ═══════════════════════════════════════════════ */

@media (min-width:768px) {
  .app { border-radius:0; max-width:100%; width:100%; }
  .kpi-grid { grid-template-columns:repeat(3,1fr); }
  .main { padding:16px 24px 148px; }
  .split { grid-template-columns:1fr 1fr; }
}

@media (min-width:1200px) {
  html, body { overflow:hidden; height:100%; }

  .app {
    width:100%;
    max-width:100%;
    height:100vh;
    display:grid;
    grid-template-columns:240px 1fr;
    grid-template-rows:auto 1fr auto;
    overflow:hidden;
  }

  /* Statusbar hidden */
  .statusbar { display:none; }

  /* Appbar spans full top */
  .appbar {
    grid-column:2;
    grid-row:1;
    height:56px;
    padding:0 28px;
    border-bottom:1px solid var(--line);
    background:rgba(11,18,32,.9);
    backdrop-filter:blur(12px);
    border-radius:0;
  }
  .appbar-title { font-size:18px; }

  /* Main content */
  .main {
    grid-column:2;
    grid-row:2 / 4;
    padding:24px 28px 32px;
    overflow-y:auto;
    overflow-x:hidden;
  }

  /* Tabbar becomes vertical sidebar */
  .tabbar {
    grid-column:1;
    grid-row:1 / 4;
    display:flex !important;
    flex-direction:column;
    gap:3px;
    padding:16px 10px;
    width:240px;
    height:100%;
    border-right:1px solid var(--line);
    border-top:none;
    background:linear-gradient(180deg,rgba(15,26,48,.98),rgba(11,18,32,.98));
    position:static;
    backdrop-filter:blur(16px);
    overflow-y:auto;
  }

  .tab {
    flex-direction:row;
    justify-content:flex-start;
    padding:10px 14px;
    border-radius:10px;
    gap:12px;
    border:1px solid transparent;
    width:100%;
  }
  .tab span { font-size:13px; font-weight:600; }
  .tab svg { width:18px; height:18px; flex-shrink:0; }
  .tab.active {
    background:rgba(79,140,255,.14);
    border-color:rgba(79,140,255,.3);
  }

  /* Hide back button */
  #btnBack { display:none; }

  /* Chatbar */
  .chatbar {
    position:relative;
    bottom:auto;
    left:auto;
    transform:none;
    width:100%;
  }

  /* Modals centered on desktop */
  .modal-backdrop { align-items:center; }
  .modal { border-radius:20px; max-width:560px; margin:auto; }

  /* Calendar cells bigger */
  .ioscal-cell { min-height:58px; }
  .ioscal-grid { gap:6px; padding:12px; }

  /* Card grids */
  .kpi-grid { grid-template-columns:repeat(3,1fr); gap:14px; }

  /* Week view scrollable */
  .week-wrap { overflow-x:auto; }
}

    /* ── Desktop layout (≥ 1200px) ─────────────────────────────────────────── */
    @media (min-width: 1200px) {

      /* App container centré, plus large */
      .app {
        max-width: 1400px;
        margin: 0 auto;
      }

      /* Sidebar verticale à gauche */
      .tabbar {
        position: fixed;
        left: 0; top: 0; bottom: 0;
        width: 200px;
        flex-direction: column;
        justify-content: flex-start;
        padding: 24px 0 24px;
        border-right: 1px solid var(--line);
        border-top: none;
        height: 100vh;
        overflow-y: auto;
        background: var(--panel);
        z-index: 100;
      }
      .tabbar .tab {
        flex-direction: row;
        gap: 12px;
        padding: 14px 20px;
        width: 100%;
        justify-content: flex-start;
        border-radius: 0;
        font-size: 14px;
        border-bottom: none;
      }
      .tabbar .tab svg {
        width: 20px; height: 20px;
        flex-shrink: 0;
      }
      .tabbar .tab.active {
        background: rgba(79,140,255,.12);
        border-right: 3px solid var(--primary);
      }

      /* Main content décalé à droite de la sidebar */
      .shell {
        display: grid;
        grid-template-columns: 200px 1fr;
        grid-template-rows: auto 1fr;
        height: 100vh;
      }
      .header {
        grid-column: 2;
        grid-row: 1;
      }
      .main {
        grid-column: 2;
        grid-row: 2;
        padding: 24px 32px;
        overflow-y: auto;
      }

      /* Dashboard direction : 2 colonnes */
      .main[data-tab="dashboard_dir"] > *,
      .main > .dash-grid {
        display: contents;
      }
      .main {
        display: block;
      }

      /* KPI grid : 3 colonnes déjà, on les agrandit */
      .kpi-grid {
        grid-template-columns: repeat(3, 1fr);
        gap: 16px;
        margin-bottom: 20px;
      }
      .kpi-card {
        padding: 20px;
      }
      .kpi-val {
        font-size: 32px;
      }

      /* Cards en 2 colonnes sur dashboard et validations */
      .desktop-2col {
        display: grid;
        grid-template-columns: 1fr 1fr;
        gap: 20px;
        align-items: start;
      }
      .desktop-3col {
        display: grid;
        grid-template-columns: 1fr 1fr 1fr;
        gap: 20px;
        align-items: start;
      }

      /* Chat en 2 panneaux */
      .desktop-chat {
        display: grid;
        grid-template-columns: 280px 1fr;
        gap: 20px;
        align-items: start;
        height: calc(100vh - 120px);
      }
      .desktop-chat .carditem {
        height: 100%;
        display: flex;
        flex-direction: column;
      }
      .desktop-chat .chat {
        flex: 1;
        overflow-y: auto;
        max-height: none;
      }
      .chatbar {
        position: static;
        transform: none !important;
        width: 100%;
        border-radius: 12px;
        margin-top: 10px;
      }
    }

    @media (min-width: 1200px) and (max-width: 1599px) {
      .tabbar { width: 180px; }
      .shell { grid-template-columns: 180px 1fr; }
      .header { grid-column: 2; }
      .main { grid-column: 2; padding: 20px 24px; }
    }

    </style>

// ── Helpers ───────────────────────────────────────────────────────────────────
function nowTime(){ return new Date().toLocaleTimeString("fr-FR",{hour:"2-digit",minute:"2-digit"}); }
function iso(d){ return d.toISOString().slice(0,10); }
function daysFromNow(n){ const d=new Date(); d.setDate(d.getDate()+n); return iso(d); }
function fmtDate(isoDate){ const d=new Date(isoDate+"T00:00:00"); return d.toLocaleDateString("fr-FR",{weekday:"short",day:"2-digit",month:"short"}); }
function pendingCount(){
  return state.swapRequests.filter(r=>r.status==="pending").length
       + state.leaveRequests.filter(r=>r.status==="pending").length
       + state.overtime.filter(r=>r.status==="pending").length;
}

function agentNotifCount(){
  const uid = state.session?.userId;
  return (state.notifications||[]).filter(n=>n.userId===uid&&!n.read).length;
}
function markNotifsRead(){
  const uid = state.session?.userId;
  (state.notifications||[]).forEach(n=>{ if(n.userId===uid) n.read=true; });
  saveState();
}
function pushNotif(userId, msg, type){
  state.notifications = state.notifications||[];
  state.notifications.push({id:"n_"+Math.random().toString(16).slice(2), userId, msg, type, time:nowTime(), read:false});
}
function hoursThisMonth(userId){
  const now=new Date(), ym=`${now.getFullYear()}-${String(now.getMonth()+1).padStart(2,"0")}`;
  const shiftMins=state.shifts.filter(s=>s.userId===userId&&s.date.startsWith(ym)).reduce((acc,s)=>{
    const [sh,sm]=s.start.split(":").map(Number);
    let [eh,em]=s.end.split(":").map(Number);
    let mins=(eh*60+em)-(sh*60+sm);
    if(mins<0) mins+=24*60;
    return acc+mins;
  },0);
  return shiftMins;
}
function hoursThisWeek(userId){
  const now = new Date();
  // Monday of current week
  const day = now.getDay() === 0 ? 6 : now.getDay() - 1;
  const monday = new Date(now); monday.setDate(now.getDate() - day); monday.setHours(0,0,0,0);
  const sunday = new Date(monday); sunday.setDate(monday.getDate() + 6);
  const isoMonday = monday.toISOString().slice(0,10);
  const isoSunday = sunday.toISOString().slice(0,10);
  return state.shifts
    .filter(s => s.userId === userId && s.date >= isoMonday && s.date <= isoSunday)
    .reduce((acc, s) => {
      const [sh,sm] = s.start.split(':').map(Number);
      let [eh,em] = s.end.split(':').map(Number);
      let mins = (eh*60+em) - (sh*60+sm);
      if(mins < 0) mins += 24*60;
      return acc + mins;
    }, 0);
}

function otThisMonth(userId){
  const now=new Date(), ym=`${now.getFullYear()}-${String(now.getMonth()+1).padStart(2,"0")}`;
  // pending + approved
  return state.overtime.filter(o=>o.userId===userId&&o.date.startsWith(ym)&&o.status!=="refused")
    .reduce((acc,o)=>acc+o.minutes,0);
}
function fmtHours(mins){ return `${Math.floor(mins/60)}h${mins%60?String(mins%60).padStart(2,"0"):""}`; }
function countLeaveDays(from, to){
  const a=new Date(from+"T00:00:00"), b=new Date(to+"T00:00:00");
  return Math.round((b-a)/86400000)+1;
}
function daysBetween(from, to){
  const a = new Date(from+"T00:00:00"), b = new Date(to+"T00:00:00");
  return Math.max(1, Math.round((b-a)/86400000)+1);
}
function getLeaveQuota(userId){
  const s = state.leaveSettings || {};
  return (s.perUser && s.perUser[userId]) ? s.perUser[userId] : (s.defaultQuota || 25);
}
function leaveUsedDays(userId){
  const year = new Date().getFullYear().toString();
  return state.leaveRequests
    .filter(r=>r.userId===userId && (r.status==="approved"||r.status==="pending") && r.type==="Congés payés" && r.from && r.from.startsWith(year))
    .reduce((acc,r)=>acc+daysBetween(r.from,r.to),0);
}
function leavePendingDays(userId){
  const year = new Date().getFullYear().toString();
  return state.leaveRequests
    .filter(r=>r.userId===userId && r.status==="pending" && r.type==="Congés payés" && r.from && r.from.startsWith(year))
    .reduce((acc,r)=>acc+daysBetween(r.from,r.to),0);
}
function leaveRemainingBar(userId, label){
  const quota   = getLeaveQuota(userId);
  const used    = leaveUsedDays(userId);
  const pending = leavePendingDays(userId);
  const approved = used - pending;
  const remaining = Math.max(0, quota - used);
  const pctApproved = Math.min(100, Math.round(approved/quota*100));
  const pctPending  = Math.min(100 - pctApproved, Math.round(pending/quota*100));
  const color = remaining <= 3 ? "#ff4f6d" : remaining <= 7 ? "#ff9f43" : "#32d583";
  return `<div style="margin:10px 0 14px">
    ${label?`<div style="font-size:12px;color:var(--muted);margin-bottom:6px">${label}</div>`:""}
    <div style="display:flex;justify-content:space-between;align-items:baseline;margin-bottom:6px">
      <div style="display:flex;align-items:baseline;gap:6px">
        <span style="font-weight:900;font-size:22px;color:${color}">${remaining}j</span>
        <span style="font-size:12px;color:var(--muted)">restants</span>
      </div>
      <span style="font-size:11px;color:var(--muted)">${approved}j pris · ${pending>0?`<span style="color:#ff9f43">${pending}j en attente</span> · `:""}${quota}j quota</span>
    </div>
    <div style="height:8px;border-radius:999px;background:rgba(255,255,255,.08);overflow:hidden;position:relative">
      <div style="position:absolute;left:0;top:0;height:100%;width:${pctApproved}%;background:var(--primary);border-radius:999px;transition:width .4s"></div>
      <div style="position:absolute;left:${pctApproved}%;top:0;height:100%;width:${pctPending}%;background:#ff9f43;border-radius:999px;transition:width .4s"></div>
    </div>
    <div style="display:flex;gap:12px;margin-top:5px">
      <span style="font-size:10px;color:var(--muted);display:flex;align-items:center;gap:4px"><span style="width:8px;height:8px;border-radius:999px;background:var(--primary);display:inline-block"></span>Approuvés</span>
      ${pending>0?`<span style="font-size:10px;color:var(--muted);display:flex;align-items:center;gap:4px"><span style="width:8px;height:8px;border-radius:999px;background:#ff9f43;display:inline-block"></span>En attente</span>`:""}
    </div>

function requestNotifPermission(){
  if('Notification' in window && Notification.permission === 'default'){
    Notification.requestPermission().then(checkShiftReminders);
  } else {
    checkShiftReminders();
  }
}

function pushNotif(title, body, icon){
  if(!('Notification' in window) || Notification.permission !== 'granted') return;
  try {
    new Notification(title, {
      body: body,
      icon: icon || 'https://floriandinel21-byte.github.io/Application-Mon-Ehpad/icon.png',
      badge: 'https://floriandinel21-byte.github.io/Application-Mon-Ehpad/icon.png',
      tag: 'ehpad-' + Date.now()
    });
  } catch(e) {}
}

// ── Rappels de shift ─────────────────────────────────────────────────────────
const REMINDER_KEY = 'ehpad_reminded';

function checkShiftReminders(){
  if(!('Notification' in window) || Notification.permission !== 'granted') return;
  if(!state.session?.userId) return;
  const uid = state.session.userId;
  if(state.session.role === 'direction') return;

  const now = new Date();
  const todayIso = iso(now);
  const tomorrowIso = iso(new Date(now.getFullYear(), now.getMonth(), now.getDate()+1));
  const hour = now.getHours();
  const nowMins = hour*60+now.getMinutes();

  const reminded = JSON.parse(localStorage.getItem(REMINDER_KEY)||'{}');

  // ── Rappel 1h avant — uniquement si le shift commence après 8h ──────────────
  const todayShift = state.shifts.find(s=>s.userId===uid && s.date===todayIso);
  if(todayShift){
    const [sh,sm] = todayShift.start.split(':').map(Number);
    const shiftMins = sh*60+sm;
    const diff = shiftMins - nowMins;
    const remKey = `h1_${todayIso}_${todayShift.id}`;
    // Seulement si shift après 8h et on est dans la fenêtre 60-70min avant
    if(sh >= 8 && diff > 0 && diff <= 60 && !reminded[remKey]){
      reminded[remKey] = true;
      localStorage.setItem(REMINDER_KEY, JSON.stringify(reminded));
      pushNotif(
        `⏰ Shift dans 1h — ${todayShift.label}`,
        `${todayShift.start}–${todayShift.end} · ${todayShift.unit}`
      );
    }
  }

  // ── Rappel la veille entre 18h et 20h ──────────────────────────────────────
  const tomorrowShift = state.shifts.find(s=>s.userId===uid && s.date===tomorrowIso);
  if(tomorrowShift && hour >= 18 && hour < 20){
    const remKey = `eve_${tomorrowIso}_${tomorrowShift.id}`;
    if(!reminded[remKey]){
      reminded[remKey] = true;
      localStorage.setItem(REMINDER_KEY, JSON.stringify(reminded));
      const dateLabel = new Date(tomorrowIso+'T00:00:00').toLocaleDateString('fr-FR',{weekday:'long'});
      pushNotif(
        `📅 Shift demain — ${tomorrowShift.label}`,
        `${capitalize(dateLabel)} · ${tomorrowShift.start}–${tomorrowShift.end} · ${tomorrowShift.unit}`
      );
    }
  }
}

// Vérifie toutes les 5 minutes
setInterval(checkShiftReminders, 5 * 60 * 1000);

// Vérifie aussi quand la page reprend le focus
document.addEventListener('visibilitychange', ()=>{
  if(document.visibilityState === 'visible') checkShiftReminders();
});

function setupLogin(){

  const userSel=document.getElementById("loginUser");
  roleSel.value=state.session?.role||"agent";

  function fillUsers(){
    const users=state.users.filter(u=>u.role===roleSel.value);
    userSel.innerHTML=users.map(u=>`<option value="${u.id}">${u.name} — ${u.unit}</option>`).join("");
    userSel.value=users[0]?.id||"";
    renderAvatars(users);
    const loginBtn=document.getElementById("btnLogin");
    if(loginBtn) loginBtn.textContent=roleSel.value==="direction"?"Se connecter en tant que Direction":"Se connecter en tant qu'Agent";

    let wrap=document.getElementById("loginAvatars");
    if(!wrap){
      wrap=document.createElement("div"); wrap.id="loginAvatars"; wrap.className="avatar-row";
      document.getElementById("btnLogin").before(wrap);

function computeAlerts(){
  const alerts = [];
  const now = new Date();
  const ym = now.getFullYear()+'-'+String(now.getMonth()+1).padStart(2,'0');

  state.users.filter(u=>u.role==='agent').forEach(u=>{
    // Congés faibles (< 5j restants)
    const used = leaveUsedDays(u.id);
    const quota = getLeaveQuota(u.id);
    const rem = Math.max(0, quota - used);
    if(rem <= 5){
      alerts.push({level:'danger', icon:'🏖️', msg: u.name + ' — seulement <strong>' + rem + 'j</strong> de congés restants'});
    }

    // Heures supp excessives (> 120 min ce mois)
    const otMins = state.overtime
      .filter(o=>o.userId===u.id && o.status==='approved' && o.date.startsWith(ym))
      .reduce((a,o)=>a+o.minutes,0);
    if(otMins > 120){
      const h = Math.floor(otMins/60), m = otMins%60;
      alerts.push({level:'warn', icon:'⏱️', msg: u.name + ' — <strong>' + h + 'h' + (m?String(m).padStart(2,'0'):'') + '</strong> de supp ce mois'});
    }
  });

  // ── Sous-staffing sur les 14 prochains jours ────────────────────────────────
  const minStaffing = state.minStaffing || {}; // { "Unité 1": 2, ... }
  const units = [...new Set(state.shifts.map(s=>s.unit))].sort();
  const seenUnderstaffed = new Set();
  for(let i=0; i<=13; i++){
    const d = new Date(now.getFullYear(), now.getMonth(), now.getDate()+i);
    const di = iso(d);
    for(const unit of units){
      const min = minStaffing[unit] || 2; // seuil par défaut : 2 agents/jour
      const staffed = state.shifts.filter(s=>s.unit===unit && s.date===di).length;
      const absent = state.leaveRequests.filter(r=>
        r.status==='approved' && r.from<=di && r.to>=di &&
        state.users.find(u=>u.id===r.userId && u.unit===unit)
      ).length;
      const effective = staffed - absent;
      if(effective < min && !seenUnderstaffed.has(unit+'_'+di)){
        seenUnderstaffed.add(unit+'_'+di);
        const label = i===0 ? "aujourd'hui" : i===1 ? "demain" : "le "+d.toLocaleDateString("fr-FR",{weekday:"short",day:"2-digit",month:"short"});
        alerts.push({
          level: effective===0 ? 'danger' : 'warn',
          icon: '👥',
          msg: '<strong>' + unit + '</strong> — sous-staffé ' + label
            + ' : <strong>' + effective + '</strong>/' + min + ' agents minimum'
        });
      }
    }
  }

  // Demandes en attente depuis > 48h
  const cutoff = Date.now() - 48*3600*1000;
  [...state.swapRequests, ...state.leaveRequests, ...state.overtime]
    .filter(r => r.status === 'pending' && r.createdAt)
    .forEach(r => {
      try {
        const parts = r.createdAt.split(' ');
        if(parts.length >= 2){
          const [d,mo,y] = parts[0].split('/');
          const [hh,mm] = parts[1].split(':');
          const ts = new Date(y,mo-1,d,hh,mm).getTime();
          if(ts < cutoff){
            const who = r.requesterName || r.targetName || userName(r.userId||'');
            const type = r.requesterShiftId !== undefined ? 'échange' : r.type !== undefined ? 'congé' : 'heures supp';
            alerts.push({level:'info', icon:'🕐', msg: 'Demande de <strong>' + (who||'agent') + '</strong> (' + type + ') en attente depuis + de 48h'});
          }
        }
      } catch(e){}
    });

  return alerts;
}

  const colors = {danger:'rgba(255,79,109,.12)', warn:'rgba(255,159,67,.12)', info:'rgba(79,140,255,.10)'};
  const borders = {danger:'rgba(255,79,109,.35)', warn:'rgba(255,159,67,.35)', info:'rgba(79,140,255,.30)'};

function getNextShift(userId){
  const todayIso = iso(new Date());
  return state.shifts
    .filter(s => s.userId === userId && s.date >= todayIso)
    .sort((a,b) => a.date.localeCompare(b.date) || a.start.localeCompare(b.start))[0] || null;
}

function countdownLabel(shiftIso, startTime){
  const now = new Date();
  const todayIso = iso(now);
  const tomorrowIso = iso(new Date(now.getFullYear(), now.getMonth(), now.getDate()+1));
  if(shiftIso === todayIso){
    const [h,m] = startTime.split(":").map(Number);
    const shiftMins = h*60+m;
    const nowMins = now.getHours()*60+now.getMinutes();
    const diff = shiftMins - nowMins;
    if(diff <= 0) return "En cours 🟢";
    if(diff < 60) return `Dans ${diff} min ⏳`;
    return `Aujourd'hui à ${startTime} ⏰`;
  }
  if(shiftIso === tomorrowIso) return `Demain à ${startTime} 🌅`;
  const days = Math.round((new Date(shiftIso+"T00:00:00") - new Date(todayIso+"T00:00:00")) / 86400000);
  return `Dans ${days} jours`;
}

function addReaction(msgId, emoji, convoKey){
  if(!msgId||!convoKey) return;
  const msgs = state.messages[convoKey];
  if(!msgs) return;
  const m = msgs.find(x=>x.id===msgId);
  if(!m) return;
  m.reactions = m.reactions||{};
  m.reactions[emoji] = (m.reactions[emoji]||0) + 1;
  saveState();
  // Re-render just the chat area
  const chat = document.getElementById("chat");
  if(chat){
    const meId = state.session?.userId;
    chat.innerHTML = msgs.map(x=>bubble(x, x.from===meId)).join("");
    bindReactions(convoKey);
  }
}

function bindReactions(convoKey){
  document.querySelectorAll(".react-opt, .react-chip").forEach(btn=>{
    btn.addEventListener("click", e=>{
      e.stopPropagation();
      const msgId = btn.getAttribute("data-msg-id");
      const emoji = btn.getAttribute("data-emoji");
      addReaction(msgId, emoji, convoKey);
    });
  });
}

function bindMsgSearch(inputId, clearId, countId){
  const input = document.getElementById(inputId);
  const clearBtn = document.getElementById(clearId);
  const countEl = document.getElementById(countId);
  if(!input) return;

  function doSearch(){
    const q = input.value.trim().toLowerCase();
    const bubbles = document.querySelectorAll("#chat .bubble");
    clearBtn.style.display = q ? "" : "none";
    let matches = 0;
    bubbles.forEach(b=>{
      const text = b.textContent.toLowerCase();
      const match = q && text.includes(q);
      if(q){
        b.style.opacity = match ? "1" : "0.25";
        if(match){
          matches++;
          // Highlight
          const msgDiv = b.querySelector("div:first-child");
          if(msgDiv && msgDiv.getAttribute("data-orig")===null){
            msgDiv.setAttribute("data-orig", msgDiv.innerHTML);
          }
          if(msgDiv){
            const orig = msgDiv.getAttribute("data-orig")||msgDiv.textContent;
            const safe = q.replace(/[.*+?^${}()|\[\]\\]/g,'\\$&');
            const highlighted = orig.replace(new RegExp(`(${safe})`, 'gi'),
              '<mark style="background:rgba(255,196,0,.45);color:inherit;border-radius:3px;padding:0 2px">$1</mark>');
            msgDiv.innerHTML = highlighted;
          }
        } else {
          const msgDiv = b.querySelector("div:first-child");
          if(msgDiv && msgDiv.getAttribute("data-orig")) msgDiv.innerHTML = msgDiv.getAttribute("data-orig");
        }
      } else {
        b.style.opacity = "1";
        const msgDiv = b.querySelector("div:first-child");
        if(msgDiv && msgDiv.getAttribute("data-orig")) msgDiv.innerHTML = msgDiv.getAttribute("data-orig");
      }
    });
    if(countEl){
      countEl.style.display = q ? "" : "none";
      countEl.textContent = q ? `${matches} résultat(s) pour "${input.value.trim()}"` : "";
    }
  }

  input.addEventListener("input", doSearch);
  clearBtn?.addEventListener("click",()=>{ input.value=""; doSearch(); input.focus(); });
}

const REACTIONS = ["👍","❤️","😂","👏","✅","🙏"];

function bubble(m,isMe){
  const reactions = m.reactions||{};
  const reactHtml = Object.entries(reactions).filter(([,v])=>v>0).map(([emoji,count])=>
    `<button class="react-chip" data-msg-id="${m.id||""}" data-emoji="${emoji}">${emoji} ${count}</button>`
  ).join("");
  const reactBar = `<div class="react-bar">
    ${REACTIONS.map(e=>`<button class="react-opt" data-msg-id="${m.id||""}" data-emoji="${e}">${e}</button>`).join("")}
  </div>`;
  if(m.type==="swap") return `<div class="bubble ${isMe?'me':''}" data-msg-id="${m.id||""}">
    <div style="font-weight:850">📅 Proposition d'échange</div>
    <div style="margin-top:6px;font-size:13px">${m.summary}</div>
    <div class="time">${m.time}</div>
    ${reactHtml?`<div class="react-chips">${reactHtml}</div>`:""}
    ${reactBar}
  </div>`;
  return `<div class="bubble ${isMe?'me':''}" data-msg-id="${m.id||""}">
    <div>${escapeHtml(m.text)}</div>
    <div class="time">${m.time}</div>
    ${reactHtml?`<div class="react-chips">${reactHtml}</div>`:""}
    ${reactBar}
  </div>`;
}

// ── Validations ───────────────────────────────────────────────────────────────
function viewValidations(){
  const sp=state.swapRequests.filter(r=>r.status==="pending").slice().reverse();
  const lp=state.leaveRequests.filter(r=>r.status==="pending").slice().reverse();
  const op=state.overtime.filter(r=>r.status==="pending").slice().reverse();
  const total=sp.length+lp.length+op.length;
  return `
    <div class="carditem" style="margin-bottom:16px">
      <h3>Validations</h3><div class="muted">${total>0?`${total} demande(s) en attente`:"Aucune demande en attente 🎉"}</div>
    </div>
    <div class="desktop-3col">
      <div class="carditem">
        <div class="section-title">Échanges (${sp.length})</div>
        <div class="cardlist">${sp.length?sp.map(r=>validationSwapCard(r)).join(""):`<div class="muted">Aucune demande.</div>`}</div>
      </div>
      <div class="carditem">
        <div class="section-title">Absences & congés (${lp.length})</div>
        <div class="cardlist">${lp.length?lp.map(r=>validationLeaveCard(r)).join(""):`<div class="muted">Aucune demande.</div>`}</div>
      </div>
      <div class="carditem">
        <div class="section-title">Heures supplémentaires (${op.length})</div>
        <div class="cardlist">${op.length?op.map(r=>validationOTCard(r)).join(""):`<div class="muted">Aucune déclaration.</div>`}</div>
      </div>
    </div>`;
}

function validationSwapCard(r){ return `<div class="carditem">
  <div style="font-weight:850">${r.requesterName||userName(r.requesterId)} ↔ ${r.targetName||userName(r.targetId)}</div>
  <div class="muted">${r.createdAt}</div><div class="hr"></div>${swapCard(r)}
  <div class="row gap" style="margin-top:10px">
    <button class="btn small primary" data-swap-approve="${r.id}">✓ Accepter</button>
    <button class="btn small danger"  data-swap-refuse="${r.id}">✗ Refuser</button>
  </div></div>`; }
function leaveCard(r){
  const badge=r.status==="approved"?`<span class="badge ok">Approuvé</span>`:r.status==="refused"?`<span class="badge no">Refusé</span>`:`<span class="badge warn">En attente</span>`;
  return `<div class="carditem"><div style="font-weight:850">${r.type} ${badge}</div><div class="muted">${fmtDate(r.from)} → ${fmtDate(r.to)}${r.note?" • "+r.note:""}</div></div>`; }
function validationLeaveCard(r){
  const days=countLeaveDays(r.from,r.to);
  return `<div class="carditem">
  <div style="font-weight:850">${userName(r.userId)} • ${r.type}</div>
  <div class="muted">${fmtDate(r.from)} → ${fmtDate(r.to)} <span class="badge" style="margin-left:4px">${days} jour${days>1?"s":""}</span>${r.note?" • "+r.note:""}</div>
  <div class="row gap" style="margin-top:10px">
    <button class="btn small primary" data-leave-approve="${r.id}">✓ Accepter</button>
    <button class="btn small danger"  data-leave-refuse="${r.id}">✗ Refuser</button>
  </div></div>`; }
function otCard(r){
  const badge=r.status==="approved"?`<span class="badge ok">Validé</span>`:r.status==="refused"?`<span class="badge no">Refusé</span>`:`<span class="badge warn">En attente</span>`;
  return `<div class="carditem"><div style="font-weight:850">${r.minutes} min ${badge}</div><div class="muted">${fmtDate(r.date)}${r.note?" • "+r.note:""}</div></div>`; }
function validationOTCard(r){ return `<div class="carditem">
  <div style="font-weight:850">${userName(r.userId)} • ${r.minutes} min</div>
  <div class="muted">${fmtDate(r.date)}${r.note?" • "+r.note:""}</div>
  <div class="row gap" style="margin-top:10px">
    <button class="btn small primary" data-ot-approve="${r.id}">✓ Valider</button>
    <button class="btn small danger"  data-ot-refuse="${r.id}">✗ Refuser</button>
  </div></div>`; }

function renderTagPicker(id, currentValue){
  const selected = currentValue ? currentValue.split(",").map(s=>s.trim()).filter(Boolean) : [];
  const selChips = selected.map(s =>
    `<span class="tag-sel-chip" data-val="${escHtml(s)}">${escHtml(s)} <span class="rm">✕</span></span>`
  ).join("");

  return `
    <div class="tag-picker-wrap" id="${id}_wrap">
      <div class="tag-picker-input-row">
        <input class="tag-picker-search" id="${id}_search" placeholder="Rechercher ou saisir…" autocomplete="off"/>
      </div>
      <ul class="tag-suggestions hidden" id="${id}_sugg"></ul>
      <div class="tag-sel-list" id="${id}_sel">${selChips}</div>
    </div>`;
}

function escHtml(s){ return String(s).replace(/[&<>"']/g,c=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c])); }

function bindTagPickers(){
  ["p_allergies","p_treatments"].forEach(id=>{
    const wrap = document.getElementById(id+"_wrap"); if(!wrap) return;
    const list = id==="p_allergies" ? ALLERGIES_LIST : MEDICATIONS_LIST;
    const search = document.getElementById(id+"_search");
    const sugg   = document.getElementById(id+"_sugg");
    const selDiv = document.getElementById(id+"_sel");

    function getSelected(){ return [...selDiv.querySelectorAll(".tag-sel-chip")].map(c=>c.getAttribute("data-val")); }

    function addItem(val){
      val = val.trim(); if(!val) return;
      if(getSelected().includes(val)) return;
      const span = document.createElement("span");
      span.className = "tag-sel-chip";
      span.setAttribute("data-val", val);
      span.innerHTML = escHtml(val)+` <span class="rm">✕</span>`;
      span.querySelector(".rm").addEventListener("click",()=>span.remove());
      selDiv.appendChild(span);
      search.value = "";
      sugg.innerHTML = ""; sugg.classList.add("hidden");
    }

    // Bind remove on pre-existing chips
    selDiv.querySelectorAll(".tag-sel-chip .rm").forEach(rm=>rm.addEventListener("click",()=>rm.closest(".tag-sel-chip").remove()));

    search.addEventListener("input",()=>{
      const q = search.value.toLowerCase().trim();
      if(!q){ sugg.innerHTML=""; sugg.classList.add("hidden"); return; }
      const matches = list.filter(s=>s.toLowerCase().includes(q) && !getSelected().includes(s)).slice(0,8);
      if(!matches.length){
        sugg.innerHTML=`<li style="color:var(--muted);cursor:default;font-style:italic">Aucun résultat — appuie sur Entrée pour ajouter</li>`;
        sugg.classList.remove("hidden"); return;
      }
      sugg.innerHTML = matches.map(m=>`<li data-val="${escHtml(m)}">${escHtml(m)}</li>`).join("");
      sugg.classList.remove("hidden");
    });

    sugg.addEventListener("click", e=>{
      const li = e.target.closest("li"); if(!li) return;
      addItem(li.getAttribute("data-val"));
    });

    search.addEventListener("keydown", e=>{
      if(e.key==="Enter"){
        e.preventDefault();
        const first = sugg.querySelector("li");
        if(first) addItem(first.getAttribute("data-val"));
        else if(search.value.trim()) addItem(search.value);
      }
      if(e.key==="Escape"){ sugg.innerHTML=""; sugg.classList.add("hidden"); }
    });

    // Close suggestions on outside click
    document.addEventListener("click", e=>{ if(!wrap.contains(e.target)){ sugg.innerHTML=""; sugg.classList.add("hidden"); } }, {capture:true});
  });
}

function readTagPicker(id){
  const selDiv = document.getElementById(id+"_sel"); if(!selDiv) return "";
  return [...selDiv.querySelectorAll(".tag-sel-chip")].map(c=>c.getAttribute("data-val")).join(", ");
}

  const r=state.swapRequests.find(x=>x.id===id); if(!r) return; r.status=status; r.resolvedAt=nowTime(); r.resolvedBy=me().name;
  if(status==="approved"){
    const s1=state.shifts.find(s=>s.id===r.requesterShiftId), s2=state.shifts.find(s=>s.id===r.targetShiftId);
    if(s1&&s2){const tmp=s1.userId;s1.userId=s2.userId;s2.userId=tmp;}
    // Supprimer les messages de type swap entre les deux agents
    const swapKey=convo(r.requesterId,r.targetId);
    if(state.messages[swapKey]) state.messages[swapKey]=state.messages[swapKey].filter(m=>m.type!=="swap");
  }
  const emoji=status==="approved"?"✅":"❌";
  const label=status==="approved"?"validé":"refusé";
  pushNotif(r.requesterId,`Échange avec ${r.targetName||""} ${label} par la direction ${emoji}`,"swap");
  pushNotif(r.targetId,`Échange avec ${r.requesterName||""} ${label} par la direction ${emoji}`,"swap");
  saveState();
  if(status==="approved") pushNotif('✅ Échange validé', 'L\'échange entre ' + (r.requesterName||userName(r.requesterId)) + ' et ' + (r.targetName||userName(r.targetId)) + ' a été approuvé.', null);
  else pushNotif('❌ Échange refusé', 'La demande d\'échange de ' + (r.requesterName||userName(r.requesterId)) + ' a été refusée.', null);
  toast(status==="approved"?"Échange validé ✅ — planning mis à jour":"Échange refusé ❌"); renderTab(currentTab);
}

function setOTStatus(id,status){

function toast(msg, type){
  const el=document.getElementById("toast");
  if(!el) return;
  // Auto-detect type from message if not provided
  if(!type){
    if(/✅|validé|enregistré|envoyé|ajouté|déclaré|changé|connecté|approuvé/i.test(msg)) type="success";
    else if(/❌|refusé|erreur|introuvable|impossible/i.test(msg)) type="error";
    else type="info";
  }
  const icons={success:"✅",error:"❌",info:"ℹ️"};
  // Strip existing emoji from msg to avoid duplicates
  const cleanMsg=msg.replace(/✅|❌|⚠️|ℹ️/g,"").trim();
  document.getElementById("toastIcon").textContent=icons[type]||"";
  document.getElementById("toastMsg").textContent=cleanMsg;
  el.className="toast "+type;
  clearTimeout(window.__toastTimer);
  window.__toastTimer=setTimeout(()=>{ el.classList.add("hidden"); },3200);
}
function userName(id){ return state.users.find(u=>u.id===id)?.name||id; }
function convo(a,b){ return [a,b].sort().join("_"); }
function escapeHtml(s){ return String(s).replace(/[&<>"']/g,c=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c])); }
function scrollChatBottom(){ const c=document.getElementById("chat"); if(c) c.scrollIntoView({block:"end"}); }

// ── Calendrier iOS ────────────────────────────────────────────────────────────
function bindIOSCalendar(){
  const wrap=document.querySelector("[data-ioscal='1']"); if(!wrap) return;
  wrap.querySelector("[data-cal-prev]")?.addEventListener("click",()=>{
    state.ui=state.ui||{}; const ym=state.ui.calendarYM||{y:new Date().getFullYear(),m:new Date().getMonth()};
    let {y,m}=ym; m--; if(m<0){m=11;y--;} state.ui.calendarYM={y,m}; saveState(); renderTab(currentTab);
  });
  wrap.querySelector("[data-cal-next]")?.addEventListener("click",()=>{
    state.ui=state.ui||{}; const ym=state.ui.calendarYM||{y:new Date().getFullYear(),m:new Date().getMonth()};
    let {y,m}=ym; m++; if(m>11){m=0;y++;} state.ui.calendarYM={y,m}; saveState(); renderTab(currentTab);
  });
  wrap.querySelectorAll("[data-cal-unit]").forEach(btn=>btn.addEventListener("click",()=>{
    state.ui=state.ui||{};
    const unit=btn.getAttribute("data-cal-unit");
    if(isDirection()) state.ui.calendarUnit=unit;
    else state.ui.agentPlanningUnit=unit;
    saveState(); renderTab(currentTab);
  }));
  wrap.querySelectorAll("[data-cal-date]").forEach(cell=>{
    if(cell.classList.contains("off")) return;
    const di=cell.getAttribute("data-cal-date");
    cell.addEventListener("click",()=>{
      state.ui=state.ui||{}; state.ui.calendarSelectedIso=di; saveState();
      wrap.querySelectorAll(".ioscal-cell").forEach(c=>c.classList.toggle("sel",c.getAttribute("data-cal-date")===di));
      const u=me(), mode=isDirection()?"direction":"agent", calUnit=getCalUnit(mode,u);
      document.getElementById("iosCalDetail").innerHTML=renderDayDetail(di,{mode,unit:calUnit,meId:isDirection()?state.session.userId:u.id});
    });
  });
}

function getCalUnit(mode,u){
  state.ui=state.ui||{};
  if(mode==="direction") return state.ui.calendarUnit||"Unité 1";
  return state.ui.agentPlanningUnit||u?.unit||"Unité 1";
}
function sameDay(a,b){ return a.getFullYear()===b.getFullYear()&&a.getMonth()===b.getMonth()&&a.getDate()===b.getDate(); }

// ── Vue semaine ───────────────────────────────────────────────────────────────
function renderWeekView({meId, unit}){
  state.ui=state.ui||{};
  const today=new Date();
  const offset=state.ui.weekOffset||0;
  const monday=new Date(today);
  monday.setDate(today.getDate()-((today.getDay()+6)%7)+offset*7);

  const days=[];
  for(let i=0;i<7;i++){
    const d=new Date(monday); d.setDate(monday.getDate()+i);
    days.push(d);
  }
  const weekLabel=`${days[0].toLocaleDateString("fr-FR",{day:"2-digit",month:"short"})} – ${days[6].toLocaleDateString("fr-FR",{day:"2-digit",month:"short",year:"numeric"})}`;

  // All agents in unit
  const unitAgents = state.users.filter(u=>u.role==="agent"&&u.unit===unit);

  // Header row: days
  const headerCells = days.map(d=>{
    const dw=d.getDay(), isToday=sameDay(d,today);
    const numColor=(dw===0||dw===6)?"color:rgba(255,150,150,.9)":"";
    const bg=isToday?"background:rgba(79,140,255,.15);border-radius:8px;":"";
    return `<th style="padding:6px 4px;text-align:center;font-weight:600;font-size:11px;min-width:60px;${bg}">
      <div style="${numColor};font-size:10px;color:var(--muted)">${d.toLocaleDateString("fr-FR",{weekday:"short"})}</div>
      <div style="${numColor};font-weight:800;font-size:14px">${d.getDate()}</div>
    </th>`;
  }).join("");

  // Agent rows
  const agentRows = unitAgents.map(agent=>{
    const isMe = agent.id===meId;
    const cells = days.map(d=>{
      const di=iso(d), isToday=sameDay(d,today);
      const s=state.shifts.find(sh=>sh.userId===agent.id&&sh.date===di);
      const bg=isToday?"background:rgba(79,140,255,.06)":"";
      if(!s) return `<td style="padding:4px;text-align:center;${bg}"><span style="font-size:10px;color:rgba(255,255,255,.15)">—</span></td>`;
      const cls=shiftCls(s.label);
      const colors={matin:"rgba(79,140,255,.2)",soir:"rgba(255,159,67,.2)",night:"rgba(168,85,247,.2)"};
      const textColors={matin:"#a8c4ff",soir:"#ffd4a8",night:"#d4a8ff"};
      return `<td style="padding:4px;text-align:center;${bg}">
        <div style="background:${colors[cls]};border-radius:6px;padding:3px 4px;font-size:10px;font-weight:700;color:${textColors[cls]}">${s.label}</div>
        <div style="font-size:9px;color:var(--muted);margin-top:2px">${s.start}–${s.end}</div>
      </td>`;
    }).join("");

    const rowBg=isMe?"background:rgba(79,140,255,.07);":"";
    const nameParts=agent.name.split(" ");
    const shortName=nameParts[0]+(nameParts[1]?" "+nameParts[1][0]+".":"");
    return `<tr style="${rowBg}border-bottom:1px solid rgba(255,255,255,.04)">
      <td style="padding:8px 10px;font-size:12px;font-weight:${isMe?"800":"600"};white-space:nowrap;min-width:90px;position:sticky;left:0;background:${isMe?"rgba(15,26,48,.95)":"rgba(11,18,32,.95)"}">
        ${isMe?`<span style="color:var(--primary)">${shortName}</span>`:shortName}
      </td>
      ${cells}
    </tr>`;
  }).join("");

  // Weekly hours summary per agent
  const hoursRow = unitAgents.map(agent=>{
    const weekMins = days.reduce((acc,d)=>{
      const s=state.shifts.find(sh=>sh.userId===agent.id&&sh.date===iso(d));
      if(!s) return acc;
      const [sh,sm]=s.start.split(":").map(Number);
      let [eh,em]=s.end.split(":").map(Number);
      let m=(eh*60+em)-(sh*60+sm); if(m<0) m+=1440;
      return acc+m;
    },0);
    const h=Math.floor(weekMins/60), m=weekMins%60;
    const disp=weekMins>0?(h+"h"+(m?String(m).padStart(2,"0"):"")):"—";
    const color=weekMins>35*60?"#ff4f6d":weekMins>28*60?"#ff9f43":"var(--muted)";
    return `<td style="padding:4px;text-align:center;font-size:10px;font-weight:700;color:${color}">${disp}</td>`;
  }).join("");

  return `
    <div class="week-wrap" style="overflow-x:auto">
      <div class="week-nav-row">
        <button class="iconbtn" id="btnWeekPrev">${icons.chevLeft}</button>
        <span style="font-size:13px;font-weight:800">${weekLabel}</span>
        <button class="iconbtn" id="btnWeekNext">${icons.chevRight}</button>
      </div>
      <table style="width:100%;border-collapse:collapse;font-size:12px">
        <thead>
          <tr style="border-bottom:1px solid var(--line)">
            <th style="padding:6px 10px;text-align:left;font-size:11px;color:var(--muted);font-weight:600;min-width:90px;position:sticky;left:0;background:var(--card)">Agent</th>
            ${headerCells}
          </tr>
        </thead>
        <tbody>
          ${agentRows}
          <tr style="border-top:1px solid var(--line)">
            <td style="padding:6px 10px;font-size:10px;color:var(--muted);font-weight:600;position:sticky;left:0;background:var(--card)">Total semaine</td>
            ${hoursRow}
          </tr>
        </tbody>
      </table>
    </div>`;
}

function renderIOSCalendar({mode,unit,meId}){
  state.ui=state.ui||{}; const today=new Date();
  const ym=state.ui.calendarYM||{y:today.getFullYear(),m:today.getMonth()}, {y,m}=ym;
  const first=new Date(y,m,1), daysInMonth=new Date(y,m+1,0).getDate(), dow=(first.getDay()+6)%7;
  const cells=[]; for(let i=0;i<42;i++){ const dn=i-dow+1; cells.push({date:new Date(y,m,dn),off:dn<1||dn>daysInMonth}); }
  const selIso=state.ui.calendarSelectedIso||iso(today);
  const calUnit=getCalUnit(mode,me());
  const units=[...new Set(state.shifts.map(s=>s.unit))].sort();
  const mLabel=new Date(y,m,1).toLocaleDateString("fr-FR",{month:"long",year:"numeric"});

  // Unit selector — shown for both agent and direction
  const allUnits=[...new Set(state.shifts.map(s=>s.unit))].sort();

  return `<div class="ioscal-wrap" data-ioscal="1">
    <div class="unit-selector-row">
      ${allUnits.map(u2=>`
        <button class="unit-sel-btn ${calUnit===u2?"active":""}" data-cal-unit="${u2}">${u2}</button>
      `).join("")}
    </div>
    <div class="ioscal-head">
      <div><div class="ioscal-title">${capitalize(mLabel)}</div><div class="muted">Appuyez sur un jour pour voir le détail</div></div>
      <div class="ioscal-nav">
        <button class="iconbtn" data-cal-prev>${icons.chevLeft}</button>
        <button class="iconbtn" data-cal-next>${icons.chevRight}</button>
      </div>
    </div>

    <div class="ioscal-dow"><div>L</div><div>M</div><div>M</div><div>J</div><div>V</div><div style="color:rgba(255,200,100,.85)">S</div><div style="color:rgba(255,110,110,.85)">D</div></div>
    <div class="ioscal-grid">
      ${cells.map(c=>{
        const di=iso(c.date), isToday=sameDay(c.date,today), isSel=di===selIso;
        const myShifts=state.shifts.filter(s=>s.userId===meId&&s.date===di);
        const unitSh=state.shifts.filter(s=>s.unit===calUnit&&s.date===di);
        const dw=c.date.getDay(), numStyle=(dw===0||dw===6)&&!c.off?"color:rgba(255,150,150,.9)":"";
        const dots=[];
        if(myShifts.length) dots.push(`<span class="dot me"></span>`);
        if(unitSh.some(s=>s.label!=="Nuit")) dots.push(`<span class="dot unit"></span>`);
        if(unitSh.some(s=>s.label==="Nuit")) dots.push(`<span class="dot night"></span>`);
        return `<div class="ioscal-cell ${c.off?"off":""} ${isToday?"today":""} ${isSel?"sel":""}" data-cal-date="${di}">
          <div class="num" style="${numStyle}">${c.date.getDate()}</div>
          ${dots.length?`<div class="dots">${dots.join("")}</div>`:""}
        </div>`;
      }).join("")}
    </div>
    <div class="ioscal-detail" id="iosCalDetail">${renderDayDetail(selIso,{mode,unit:calUnit,meId})}</div>
  </div>`;
}

function renderDayDetail(dayIso,{mode,unit,meId}){
  const d=new Date(dayIso+"T00:00:00"), title=d.toLocaleDateString("fr-FR",{weekday:"long",day:"2-digit",month:"long"});
  const my=state.shifts.filter(s=>s.userId===meId&&s.date===dayIso);
  const unitSh=state.shifts.filter(s=>s.unit===unit&&s.date===dayIso);
  const lines=[];
  if(mode==="agent"){
    if(my.length) my.forEach(s=>lines.push(detailLine(`${s.start}–${s.end}`,s.label,"Moi",shiftCls(s.label))));
    else lines.push(`<div class="muted">Aucun horaire personnel ce jour.</div>`);
    if(unitSh.length){ lines.push(`<div class="muted" style="margin:10px 0 6px">Équipe — ${unit}</div>`); unitSh.forEach(s=>lines.push(detailLine(`${s.start}–${s.end}`,s.label,s.userId===meId?"Moi":userName(s.userId),shiftCls(s.label)))); }
  } else {
    if(unitSh.length) unitSh.forEach(s=>lines.push(detailLine(`${s.start}–${s.end}`,s.label,userName(s.userId),shiftCls(s.label))));
    else lines.push(`<div class="muted">Aucun horaire dans l'unité ce jour.</div>`);
  }
  return `<h4>${capitalize(title)}</h4>${lines.join("")}`;
}

function detailLine(time,label,tagText,tagClass){ return `<div class="detail-line"><div class="left"><div style="font-weight:900">${time}</div><div class="muted">${escapeHtml(label)}</div></div><span class="tag ${tagClass}">${escapeHtml(tagText)}</span></div>`; }
function capitalize(s){ return s?s.charAt(0).toUpperCase()+s.slice(1):s; }


// ── Export PDF ────────────────────────────────────────────────────────────────
function exportPlanningPDF(){
  const now=new Date();
  const ym=state.ui?.calendarYM||{y:now.getFullYear(),m:now.getMonth()};
  const {y,m}=ym;
  const daysInMonth=new Date(y,m+1,0).getDate();
  const monthLabel=new Date(y,m,1).toLocaleDateString("fr-FR",{month:"long",year:"numeric"});
  const units=[...new Set(state.shifts.map(s=>s.unit))].sort();
  const agents=state.users.filter(u=>u.role==="agent");

  // Build days array
  const days=[];
  for(let d=1;d<=daysInMonth;d++) days.push(new Date(y,m,d));

  let tables="";
  for(const unit of units){
    const unitAgents=agents.filter(a=>a.unit===unit);
    let rows="";
    for(const d of days){
      const di=iso(d);
      const dw=d.getDay();
      const weekendStyle=dw===0||dw===6?"background:#1a2035;":"";
      const dateLabel=d.toLocaleDateString("fr-FR",{weekday:"short",day:"2-digit",month:"short"});
      const dayShifts=state.shifts.filter(s=>s.unit===unit&&s.date===di);
      const cells=unitAgents.map(a=>{
        const s=dayShifts.find(sh=>sh.userId===a.id);
        if(!s) return `<td style="color:#666;font-size:11px;padding:6px 8px;">—</td>`;
        const colors={Matin:"#1a3a6e",Soir:"#3a2a0e",Nuit:"#2a1a4e",Journée:"#3a2a0e"};
        const bg=colors[s.label]||"#1a2035";
        return `<td style="background:${bg};padding:6px 8px;font-size:11px;white-space:nowrap;">${s.start}–${s.end}<br><span style="color:#888;font-size:10px">${s.label}</span></td>`;
      }).join("");
      rows+=`<tr style="${weekendStyle}"><td style="padding:6px 8px;font-size:11px;white-space:nowrap;color:#aaa">${dateLabel}</td>${cells}</tr>`;
    }
    const headers=unitAgents.map(a=>`<th style="padding:8px;font-size:12px;font-weight:700;text-align:left;white-space:nowrap">${a.name.split(" ")[0]}</th>`).join("");
    tables+=`
      <h2 style="margin:24px 0 8px;font-size:15px;border-bottom:1px solid #333;padding-bottom:6px">${unit}</h2>
      <table style="width:100%;border-collapse:collapse;margin-bottom:16px">
        <thead><tr style="background:#0f1a30"><th style="padding:8px;font-size:12px;text-align:left">Date</th>${headers}</tr></thead>
        <tbody>${rows}</tbody>
      </table>`;
  }

  const html=`<!DOCTYPE html><html lang="fr"><head><meta charset="utf-8">
    <title>Planning EHPAD — ${capitalize(monthLabel)}</title>
    <style>
      body{font-family:system-ui,sans-serif;background:#0b1220;color:#eef3ff;padding:20px;margin:0}
      h1{font-size:18px;margin-bottom:4px} .sub{color:#a9b6d3;font-size:12px;margin-bottom:20px}
      table{border:1px solid #1e2d4a} td,th{border:1px solid #1e2d4a}
      @media print{body{background:#fff;color:#000} td,th{border:1px solid #ccc} h2{color:#000}}
    

  </head><body>
    <h1>Planning EHPAD — ${capitalize(monthLabel)}</h1>
    <div class="sub">Généré le ${now.toLocaleDateString("fr-FR",{dateStyle:"full"})}</div>
    ${tables}
    "<scr"+"ipt>window.print();</scr"+"ipt>"
  </body></html>`;
  const w = window.open('', '_blank');
  w.document.write(html);
  w.document.close();
}

// ── Export PDF personnel ─────────────────────────────────────────────────────
function exportMyPlanningPDF(){
  const u = me();
  const now = new Date();
  const ym = state.ui?.calendarYM || {y: now.getFullYear(), m: now.getMonth()};
  const {y, m} = ym;
  const daysInMonth = new Date(y, m+1, 0).getDate();
  const monthLabel = new Date(y, m, 1).toLocaleDateString("fr-FR", {month:"long", year:"numeric"});

  const days = [];
  for(let d=1; d<=daysInMonth; d++) days.push(new Date(y, m, d));

  const shiftColors = {Matin:"#1a3a6e", Soir:"#3a1a0e", Nuit:"#1a0e3a", Journée:"#0e3a1a"};
  const shiftDots   = {Matin:"#4f8cff", Soir:"#ff9f43", Nuit:"#a855f7", Journée:"#32d583"};

  let totalMins = 0;
  let rows = "";
  for(const d of days){
    const di = iso(d);
    const dw = d.getDay();
    const isWeekend = dw===0||dw===6;
    const dateLabel = d.toLocaleDateString("fr-FR", {weekday:"long", day:"2-digit", month:"long"});
    const shift = state.shifts.find(s => s.userId===u.id && s.date===di);
    if(shift){
      const [sh,sm] = shift.start.split(":").map(Number);
      let [eh,em] = shift.end.split(":").map(Number);
      let mins = (eh*60+em)-(sh*60+sm);
      if(mins<0) mins+=24*60;
      totalMins += mins;
    }
    const bg = isWeekend ? "#0e1525" : shift ? (shiftColors[shift.label]||"#0f1a30") : "transparent";
    const dot = shift ? shiftDots[shift.label]||"#4f8cff" : "transparent";
    rows += `<tr style="background:${bg}">
      <td style="padding:8px 12px;font-size:12px;color:${isWeekend?"#ff6b6b":"#a9b6d3"};white-space:nowrap">${capitalize(dateLabel)}</td>
      <td style="padding:8px 12px;text-align:center">
        ${shift?`<span style="display:inline-block;width:10px;height:10px;border-radius:50%;background:${dot};vertical-align:middle;margin-right:6px"></span><strong>${shift.start}–${shift.end}</strong>`:"<span style='color:#555'>—</span>"}
      </td>
      <td style="padding:8px 12px;font-size:12px;color:#a9b6d3">${shift?shift.label:""}</td>
      <td style="padding:8px 12px;font-size:12px;color:#a9b6d3;text-align:right">${shift?fmtHours((()=>{const [sh,sm]=shift.start.split(":").map(Number);let [eh,em]=shift.end.split(":").map(Number);let mn=(eh*60+em)-(sh*60+sm);if(mn<0)mn+=24*60;return mn;})()):"—"}</td>
    </tr>`;
  }

  const html = `<!DOCTYPE html><html lang="fr"><head><meta charset="utf-8">
  <title>Mon planning — ${capitalize(monthLabel)}</title>
  <style>
    *{box-sizing:border-box;margin:0;padding:0}
    body{font-family:system-ui,sans-serif;background:#0b1220;color:#eef3ff;padding:28px 20px}
    h1{font-size:20px;font-weight:900;margin-bottom:2px}
    .sub{color:#a9b6d3;font-size:12px;margin-bottom:6px}
    .meta{display:flex;gap:16px;margin-bottom:20px;flex-wrap:wrap}
    .chip{display:inline-flex;align-items:center;gap:6px;padding:5px 12px;border-radius:999px;font-size:12px;font-weight:700;border:1px solid rgba(255,255,255,.12);background:rgba(255,255,255,.06)}
    table{width:100%;border-collapse:collapse;border-radius:12px;overflow:hidden}
    thead tr{background:#0f1a30}
    th{padding:10px 12px;font-size:11px;text-align:left;color:#a9b6d3;text-transform:uppercase;letter-spacing:.5px;font-weight:700}
    td{border-bottom:1px solid rgba(255,255,255,.05)}
    tr:last-child td{border-bottom:none}
    .total{margin-top:16px;text-align:right;font-size:13px;color:#a9b6d3}
    .total strong{color:#eef3ff;font-size:15px}
    .legend{display:flex;gap:14px;margin-top:16px;flex-wrap:wrap}
    .leg{display:flex;align-items:center;gap:6px;font-size:11px;color:#a9b6d3}
    .leg-dot{width:10px;height:10px;border-radius:50%;flex-shrink:0}
    @media print{
      body{background:#fff;color:#000;padding:16px}
      .chip{border-color:#ccc;background:#f5f5f5;color:#333}
      thead tr{background:#e8eaf0}
      th{color:#555}
      td{border-bottom:1px solid #eee}
      .total,.sub,.leg{color:#555}
      .total strong{color:#000}
    }
  </style>
  </head><body>
    <h1>Mon Planning — ${capitalize(monthLabel)}</h1>
    <div class="sub">Généré le ${now.toLocaleDateString("fr-FR",{dateStyle:"full"})}</div>
    <div class="meta">
      <span class="chip">👤 ${u.name}</span>
      <span class="chip">🏥 ${u.unit}</span>
      <span class="chip">⏱️ Total : ${fmtHours(totalMins)}</span>
    </div>
    <table>
      <thead><tr><th>Date</th><th>Horaires</th><th>Type</th><th style="text-align:right">Durée</th></tr></thead>
      <tbody>${rows}</tbody>
    </table>
    <div class="legend">
      <div class="leg"><div class="leg-dot" style="background:#4f8cff"></div>Matin</div>
      <div class="leg"><div class="leg-dot" style="background:#ff9f43"></div>Soir</div>
      <div class="leg"><div class="leg-dot" style="background:#a855f7"></div>Nuit</div>
      <div class="leg"><div class="leg-dot" style="background:#32d583"></div>Journée</div>
    </div>
    <script>window.print();<\/script>
  </body></html>`;

  const w = window.open("", "_blank");
  if(w){ w.document.write(html); w.document.close(); }
  else toast("Autorisez les pop-ups pour exporter", "error");
}

// ── Thème ────────────────────────────────────────────────────────────────────
const THEME_KEY = 'ehpad_theme';
const mql = window.matchMedia('(prefers-color-scheme: dark)');

function applyTheme(pref){
  const isDark = pref === 'dark' || (pref === 'system' && mql.matches);
  document.documentElement.setAttribute('data-theme', isDark ? 'dark' : 'light');
}

function setTheme(pref){
  localStorage.setItem(THEME_KEY, pref);
  applyTheme(pref);
}

// Écoute les changements système
mql.addEventListener('change', () => {
  if((localStorage.getItem(THEME_KEY)||'system') === 'system') applyTheme('system');
});

// Applique dès le boot
applyTheme(localStorage.getItem(THEME_KEY) || 'system');

// ── Langue ────────────────────────────────────────────────────────────────────
function applyLang(lang){
  if(lang){
    document.documentElement.lang = lang;
    // Force Chrome/Edge built-in translation prompt
    document.documentElement.setAttribute('translate', 'yes');
  } else {
    document.documentElement.lang = 'fr';
    document.documentElement.removeAttribute('translate');
  }
}
// Apply saved language on boot
applyLang(localStorage.getItem('ehpad_lang')||'');

// ── Boot ────────────────────────────────────────────────────────────────────
requestNotifPermission();
render();
saveState();
</script>
</body>
</html>
