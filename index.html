<!doctype html>
<html lang="fr">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>EHPAD Staff – Démo Web</title>
  <link rel="stylesheet" href="styles.css" />
</head>
<body>
  <div id="app">
    <h1>EHPAD Staff – Planning</h1>
    <div class="card">
      <h2>Disponibilités / Arrêt maladie</h2>
      <label>Statut</label>
      <select id="status">
        <option>Disponible</option>
        <option>Indisponible</option>
        <option>Arrêt maladie</option>
      </select>

      <label>Du</label>
      <input type="date" id="from" />

      <label>Au</label>
      <input type="date" id="to" />

      <label>Note</label>
      <input type="text" id="note" placeholder="Optionnel"/>

      <button onclick="save()">Enregistrer</button>
      <div id="result"></div>
    </div>
  </div>
<script src="app.js"></script>
</body>
</html>
