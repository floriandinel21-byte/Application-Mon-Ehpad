<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8" />
  <title>EHPAD – Démo interne</title>
  <link rel="stylesheet" href="style.css" />
</head>
<body>
  <div id="app">
    <h1>EHPAD – Application interne (Démo locale)</h1>

    <div class="login">
      <h2>Connexion (démo)</h2>
      <select id="role">
        <option value="agent">Agent</option>
        <option value="direction">Direction</option>
      </select>
      <button onclick="login()">Se connecter</button>
    </div>

    <div id="content" class="hidden">
      <nav>
        <button onclick="showTab('planning')">Planning</button>
        <button onclick="showTab('echanges')">Échanges</button>
        <button onclick="showTab('messages')">Messagerie</button>
        <button onclick="showTab('profil')">Profil & santé</button>
        <button onclick="logout()">Déconnexion</button>
      </nav>

      <section id="planning" class="tab">
        <h2>Planning</h2>
        <p>Exemple de planning de l’unité et personnel.</p>
        <ul>
          <li>14h00 – 21h30 : Agent A</li>
          <li>07h00 – 14h00 : Agent B</li>
        </ul>
      </section>

      <section id="echanges" class="tab hidden">
        <h2>Échanges d’horaires</h2>
        <p>Sélection d’un horaire et d’un collègue (démo).</p>
        <button>Proposer un échange</button>
      </section>

      <section id="messages" class="tab hidden">
        <h2>Messagerie interne</h2>
        <textarea placeholder="Écrire un message..."></textarea>
        <button>Envoyer</button>
      </section>

      <section id="profil" class="tab hidden">
        <h2>Profil & santé</h2>
        <label>Allergies</label>
        <input type="text" placeholder="Ex : pénicilline" />
        <label>Traitements</label>
        <input type="text" placeholder="Ex : traitement X" />
        <label>Taille (cm)</label>
        <input type="number" />
        <label>Poids (kg)</label>
        <input type="number" />
        <button>Enregistrer</button>
      </section>
    </div>
  </div>

  <script src="script.js"></script>
</body>
</html>
