<!doctype html>
<html lang="fr">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>EHPAD – Démo Web (style iOS)</title>
  <link rel="stylesheet" href="styles.css" />
</head>
<body>
  <div id="app">
    <header class="top">
      <h1>EHPAD</h1>
      <span class="badge">Démo locale</span>
    </header>

    <main id="content">
      <section class="card">
        <h2>Planning</h2>
        <div id="calendar"></div>
      </section>

      <section class="card">
        <h2>Disponibilités</h2>

        <label>Statut</label>
        <select id="status">
          <option>Disponible</option>
          <option>Indisponible</option>
          <option>Arrêt maladie</option>
        </select>

        <label>Date</label>
        <input type="date" id="date" />

        <label>Note (optionnel)</label>
        <input type="text" id="note" placeholder="Ex : RDV médical" />

        <button onclick="save()">Enregistrer</button>
        <div id="result" class="result"></div>
      </section>
    </main>

    <nav class="tabbar">
      <button class="active">Planning</button>
      <button>Échanges</button>
      <button>Messages</button>
      <button>Profil</button>
    </nav>
  </div>

  <script src="app.js"></script>
</body>
</html>
